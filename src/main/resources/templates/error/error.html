<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - HealthApp</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; }
        .status { font-size: 1.4rem; margin: 0.2rem 0; }
    </style>
</head>
<body>
<h1>Ha ocurrido un error</h1>
<div class="card">
    <p class="status"><strong>Estado:</strong> <span th:text="${status}">500</span></p>
    <p><strong>Error:</strong> <span th:text="${error}">Error interno</span></p>
    <p><strong>Detalle:</strong> <span th:text="${message}">Sin detalle</span></p>
    <p>
        <a th:href="@{/}">Volver al inicio</a>
    </p>
</div>
</body>
</html>
