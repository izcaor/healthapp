<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthApp - Perfil Paciente</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .row { margin-bottom: 0.8rem; }
        .error { color: #b00020; }
        .success { color: #0a7d20; }
        label { display: block; margin-bottom: 0.3rem; }
        input { width: 100%; padding: 0.5rem; }
        .nav a, .nav form { display: inline-block; margin-right: 1rem; }
        button { padding: 0.6rem 1rem; }
    </style>
</head>
<body>
<h1>Area de paciente</h1>

<div class="nav">
    <a th:href="@{/paciente/citas}">Mis citas</a>
    <form th:action="@{/auth/logout}" method="post">
        <button type="submit">Cerrar sesion</button>
    </form>
</div>

<p class="success" th:if="${success}" th:text="${success}"></p>

<div class="card">
    <h2>Datos de usuario</h2>
    <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
    <p><strong>Rol:</strong> <span th:text="${usuario.rol}"></span></p>
</div>

<div class="card">
    <h2>Datos del paciente</h2>

    <form th:action="@{/paciente/perfil}" th:object="${pacienteForm}" method="post">
        <div class="row">
            <label for="nombre">Nombre</label>
            <input id="nombre" type="text" th:field="*{nombre}" required>
            <small class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
        </div>

        <div class="row">
            <label for="apellidos">Apellidos</label>
            <input id="apellidos" type="text" th:field="*{apellidos}" required>
            <small class="error" th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}"></small>
        </div>

        <div class="row">
            <label for="fechaNacimiento">Fecha de nacimiento</label>
            <input id="fechaNacimiento" type="date" th:field="*{fechaNacimiento}" required>
            <small class="error" th:if="${#fields.hasErrors('fechaNacimiento')}" th:errors="*{fechaNacimiento}"></small>
        </div>

        <div class="row">
            <label for="telefono">Telefono</label>
            <input id="telefono" type="text" th:field="*{telefono}" required>
            <small class="error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></small>
        </div>

        <button type="submit">Guardar cambios</button>
    </form>
</div>
</body>
</html>
